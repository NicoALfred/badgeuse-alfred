<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badgeuse Alfred</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');
 
  :root {
    --bleu: #A8D5DC;
    --orange: #E8703A;
    --noir: #1A1A1A;
    --blanc: #F8F6F2;
    --rouge-pastel: #FADBD8;
    --vert-pastel: #EAFAF1;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--noir);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 24px 60px;
    color: var(--blanc);
  }
 
  .top-bar {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 6px;
    z-index: 100;
  }
 
  .lang-btn {
    background: #2e2e2e;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px 10px;
    color: rgba(255,255,255,0.5);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .lang-btn.active { background: rgba(168,213,220,0.15); border-color: var(--bleu); color: var(--bleu); }
 
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    color: var(--bleu);
    margin-bottom: 6px;
    text-align: center;
    margin-top: 20px;
  }
 
  .site-name {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 30px;
  }
 
  .card {
    background: #242424;
    border-radius: 20px;
    padding: 32px 28px;
    width: 100%;
    max-width: 420px;
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 16px;
  }
 
  .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 10px;
  }
 
  .agent-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }
 
  .agent-btn {
    background: #2e2e2e;
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 14px 10px;
    color: var(--blanc);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: center;
  }
  .agent-btn:hover { background: #363636; border-color: var(--bleu); }
  .agent-btn.selected { background: rgba(168,213,220,0.12); border-color: var(--bleu); color: var(--bleu); }
 
  .loading-agents {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 0.85rem;
    padding: 20px 0;
    margin-bottom: 28px;
  }
 
  .divider { height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 28px; }
 
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
 
  .action-btn {
    border: none;
    border-radius: 14px;
    padding: 18px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .action-btn .icon { font-size: 1.5rem; }
 
  .btn-arrivee {
    background: rgba(168,213,220,0.15);
    color: var(--bleu);
    border: 2px solid rgba(168,213,220,0.3);
  }
  .btn-arrivee:hover:not(:disabled), .btn-arrivee.selected {
    background: var(--bleu); color: var(--noir); border-color: var(--bleu);
  }
 
  .btn-depart {
    background: rgba(232,112,58,0.12);
    color: var(--orange);
    border: 2px solid rgba(232,112,58,0.25);
  }
  .btn-depart:hover:not(:disabled), .btn-depart.selected {
    background: var(--orange); color: white; border-color: var(--orange);
  }
 
  .action-btn:disabled { opacity: 0.25; cursor: not-allowed; }
 
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 0.78rem;
    margin-bottom: 20px;
    width: 100%;
    justify-content: center;
    background: rgba(168,213,220,0.1);
    border: 1px solid rgba(168,213,220,0.2);
    color: var(--bleu);
  }
  .status-badge.active {
    background: rgba(232,112,58,0.1);
    border-color: rgba(232,112,58,0.2);
    color: var(--orange);
  }
 
  .submit-btn {
    width: 100%;
    padding: 17px;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .submit-btn:hover { background: #d4612e; transform: translateY(-1px); }
  .submit-btn:disabled { background: #3a3a3a; color: rgba(255,255,255,0.3); cursor: not-allowed; transform: none; }
 
  .time-display {
    text-align: center;
    margin-bottom: 28px;
    padding: 14px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
  }
  .time-display .time { font-size: 1.8rem; font-weight: 300; letter-spacing: 2px; }
  .time-display .date { font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-top: 2px; text-transform: capitalize; }
 
  .error-msg {
    background: rgba(232,112,58,0.15);
    border: 1px solid rgba(232,112,58,0.3);
    color: var(--orange);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    display: none;
    text-align: center;
  }
 
  /* MODAL CONFIRMATION */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.visible { display: flex; }
 
  .modal {
    background: #2a2a2a;
    border-radius: 20px;
    padding: 32px 28px;
    width: 100%;
    max-width: 380px;
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
  }
 
  .modal-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--bleu);
    margin-bottom: 10px;
  }
  .modal-text {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .modal-text strong { color: var(--blanc); }
 
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
 
  .modal-confirm {
    padding: 14px;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-confirm:hover { background: #d4612e; }
 
  .modal-cancel {
    padding: 14px;
    background: transparent;
    color: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-cancel:hover { border-color: rgba(255,255,255,0.4); color: var(--blanc); }
 
  /* SUCCESS */
  .success-banner {
    background: rgba(168,213,220,0.1);
    border: 1px solid rgba(168,213,220,0.3);
    border-radius: 14px;
    padding: 16px 20px;
    text-align: center;
    margin-bottom: 16px;
    width: 100%;
    max-width: 420px;
  }
  .success-banner .check { font-size: 2rem; margin-bottom: 6px; }
  .success-banner .title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--bleu); }
  .success-banner .detail { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 4px; }
 
  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.5);
    padding: 10px 24px;
    border-radius: 30px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 16px;
    opacity: 0.4;
    cursor: not-allowed;
  }
  .reset-btn.unlocked {
    opacity: 1;
    cursor: pointer;
    border-color: rgba(232,112,58,0.4);
    color: var(--orange);
  }
  .reset-btn.unlocked:hover { background: rgba(232,112,58,0.1); }
 
  /* CHECKLIST */
  .checklist-wrap {
    width: 100%;
    max-width: 420px;
    display: none;
  }
 
  .checklist-card {
    background: #242424;
    border-radius: 20px;
    padding: 28px;
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 16px;
  }
 
  .checklist-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    color: var(--bleu);
    margin-bottom: 4px;
  }
  .checklist-date {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    margin-bottom: 20px;
    text-transform: capitalize;
  }
 
  /* Tâches exceptionnelles */
  .exceptional-block {
    background: rgba(250,219,216,0.1);
    border: 1px solid rgba(250,219,216,0.3);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .exceptional-block.empty {
    background: rgba(234,250,241,0.08);
    border-color: rgba(168,213,168,0.2);
  }
  .exceptional-header {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #e57373;
  }
  .exceptional-header.empty { color: #81c784; }
 
  .exceptional-zone { margin-bottom: 12px; }
  .exceptional-zone:last-child { margin-bottom: 0; }
  .exceptional-zone-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
 
  .exc-task {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 0.87rem;
    color: rgba(255,255,255,0.85);
  }
 
  .freq-pill {
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 10px;
    margin-left: auto;
    flex-shrink: 0;
    font-weight: 600;
  }
  .freq-pill.hebdo { background: rgba(168,213,168,0.2); color: #a5d6a7; }
  .freq-pill.mensuel { background: rgba(255,213,79,0.15); color: #ffd54f; }
  .freq-pill.trimestriel { background: rgba(206,147,216,0.2); color: #ce93d8; }
 
  /* Tâches quotidiennes */
  .daily-block {
    margin-bottom: 16px;
  }
  .daily-header {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--bleu);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(168,213,220,0.2);
    display: flex;
    align-items: center;
    gap: 8px;
  }
 
  .daily-zone { margin-bottom: 14px; }
  .daily-zone-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
 
  .daily-task {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 0;
    font-size: 0.87rem;
    color: rgba(255,255,255,0.75);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .daily-task:last-child { border-bottom: none; }
  .task-bullet {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--bleu);
    margin-top: 7px;
    flex-shrink: 0;
  }
 
  /* Bouton confirmation tâches */
  .confirm-tasks-btn {
    width: 100%;
    padding: 16px;
    background: rgba(168,213,220,0.15);
    color: var(--bleu);
    border: 1.5px solid rgba(168,213,220,0.4);
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
    margin-top: 8px;
  }
  .confirm-tasks-btn:hover {
    background: var(--bleu);
    color: var(--noir);
  }
  .confirm-tasks-btn.done {
    background: rgba(129,199,132,0.15);
    border-color: rgba(129,199,132,0.4);
    color: #81c784;
    cursor: default;
  }
 
  .site-error {
    text-align: center;
    padding: 40px 20px;
    color: rgba(255,255,255,0.5);
  }
  .site-error h2 { color: var(--orange); margin-bottom: 10px; }
</style>
</head>
<body>
 
<div class="top-bar">
  <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">🇫🇷</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇬🇧</button>
  <button class="lang-btn" id="btn-bn" onclick="setLang('bn')">🇧🇩</button>
</div>
 
<div class="logo">Alfred</div>
<div class="site-name" id="site-display">Chargement...</div>
 
<!-- CARTE PRINCIPALE -->
<div class="card" id="main-card">
  <div class="time-display">
    <div class="time" id="clock">--:--</div>
    <div class="date" id="dateDisplay"></div>
  </div>
 
  <div class="label" id="label-agent">Agent</div>
  <div id="agent-container">
    <div class="loading-agents" id="loading-msg">⏳ Chargement...</div>
    <div class="agent-grid" id="agent-grid" style="display:none"></div>
  </div>
 
  <div id="status-area"></div>
  <div class="divider"></div>
 
  <div class="label" id="label-action">Action</div>
  <div class="action-grid">
    <button class="action-btn btn-arrivee" id="btn-arrivee" onclick="selectAction('Arrivée')">
      <span class="icon">▶</span>
      <span id="txt-arrivee">Arrivée</span>
    </button>
    <button class="action-btn btn-depart" id="btn-depart" onclick="selectAction('Départ')">
      <span class="icon">◼</span>
      <span id="txt-depart">Départ</span>
    </button>
  </div>
 
  <div class="error-msg" id="error-msg"></div>
  <button class="submit-btn" id="submit-btn" onclick="showConfirmModal()">Valider le badge</button>
</div>
 
<!-- MODAL CONFIRMATION BADGE -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <div class="modal-icon" id="modal-icon">👋</div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-text" id="modal-text"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()" id="modal-cancel-btn">Annuler</button>
      <button class="modal-confirm" onclick="confirmBadge()" id="modal-confirm-btn">Confirmer</button>
    </div>
  </div>
</div>
 
<!-- SUCCÈS -->
<div id="success-area" style="display:none; width:100%; max-width:420px; text-align:center;">
  <div class="success-banner">
    <div class="check">✓</div>
    <div class="title" id="success-title"></div>
    <div class="detail" id="success-detail"></div>
  </div>
  <button class="reset-btn" id="reset-btn" onclick="tryReset()">← <span id="reset-label">Nouveau badge</span></button>
</div>
 
<!-- CHECKLIST -->
<div class="checklist-wrap" id="checklist-wrap">
  <div class="checklist-card">
    <div class="checklist-title" id="checklist-title">📋 Tâches du jour</div>
    <div class="checklist-date" id="checklist-date"></div>
 
    <!-- Tâches exceptionnelles -->
    <div id="exceptional-area"></div>
 
    <!-- Tâches quotidiennes -->
    <div id="daily-area"></div>
 
    <!-- Bouton confirmation -->
    <button class="confirm-tasks-btn" id="confirm-tasks-btn" onclick="confirmTasks()">
      <span id="confirm-tasks-label">✋ J'ai pris connaissance des tâches à effectuer aujourd'hui</span>
    </button>
  </div>
</div>
 
<script>

// Tâches exceptionnelles par fréquence et zone
const EXCEPTIONAL_TASKS = {
  fr: {

// Site
function getSiteFromURL() {
  const params = new URLSearchParams(window.location.search);
  const key = params.get("site");
  return key ? { key, nom: SITES[key] || null } : null;
}
 
const siteInfo = getSiteFromURL();
const SITE = siteInfo && siteInfo.nom ? siteInfo.nom : null;
 
if (SITE) {
  document.getElementById('site-display').textContent = SITE;
} else if (siteInfo) {
  document.getElementById('site-display').textContent = "Site inconnu";
  document.getElementById('main-card').innerHTML = `<div class="site-error"><h2>⚠️ Site non reconnu</h2><p>Paramètre "?site=${siteInfo.key}" inconnu.</p></div>`;
} else {
  document.getElementById('site-display').textContent = "Site non défini";
  document.getElementById('main-card').innerHTML = `<div class="site-error"><h2>⚠️ Aucun site détecté</h2><p>Cette page doit être ouverte via un tag NFC.</p></div>`;
}
 
let selectedAgent = null;
let selectedAction = null;
let currentLang = "fr";
let agentStatus = {};
let tasksConfirmed = false;
 
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('dateDisplay').textContent =
    now.toLocaleDateString(currentLang === 'en' ? 'en-GB' : 'fr-FR',
      {weekday:'long', day:'numeric', month:'long'});
}
setInterval(updateClock, 1000);
updateClock();
 
async function loadAgents() {
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    const agents = data.agents || [];
    agents.forEach(a => { agentStatus[a] = localStorage.getItem("status_" + a) || "out"; });
    const grid = document.getElementById('agent-grid');
    grid.innerHTML = "";
    agents.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'agent-btn';
      btn.textContent = name.split(' ')[0];
      btn.title = name;
      btn.onclick = () => selectAgent(name, btn);
      grid.appendChild(btn);
    });
    document.getElementById('loading-msg').style.display = 'none';
    grid.style.display = 'grid';
  } catch(err) {
    document.getElementById('loading-msg').textContent = "⚠️ Erreur";
  }
}
 
if (SITE) loadAgents();
 
function setLang(lang) {
  currentLang = lang;
  ['fr','en','bn'].forEach(l => {
    document.getElementById('btn-' + l).classList.toggle('active', l === lang);
  });
  applyLang();
}
 
function applyLang() {
  const t = T[currentLang];
  const els = {
    'label-agent': t.agent,
    'label-action': t.action,
    'txt-arrivee': t.arrivee,
    'txt-depart': t.depart,
    'submit-btn': t.valider,
    'error-msg': t.erreur,
    'loading-msg': t.chargement,
    'modal-cancel-btn': t.annuler,
    'modal-confirm-btn': t.confirmer,
  };
  Object.entries(els).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  });
  updateClock();
  updateStatusArea();
}
 
function selectAgent(name, btnEl) {
  selectedAgent = name;
  selectedAction = null;
  document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');
  document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('selected'));
  hideError();
  updateActionButtons();
  updateStatusArea();
}
 
function updateActionButtons() {
  const btnIn  = document.getElementById('btn-arrivee');
  const btnOut = document.getElementById('btn-depart');
  if (!selectedAgent) { btnIn.disabled = false; btnOut.disabled = false; return; }
  const status = agentStatus[selectedAgent] || "out";
  const tasksDone = localStorage.getItem("tasks_confirmed_" + selectedAgent) === "yes";
  btnIn.disabled  = status === "in";
  btnOut.disabled = status === "out" || !tasksDone;
}
 
function updateStatusArea() {
  const area = document.getElementById('status-area');
  if (!selectedAgent) { area.innerHTML = ''; return; }
  const status = agentStatus[selectedAgent] || "out";
  const t = T[currentLang];
  if (status === "in") {
    const since = localStorage.getItem("checkin_" + selectedAgent) || "";
    area.innerHTML = `<div class="status-badge active">🟠 ${t.statut_in} ${since}</div>`;
  } else {
    area.innerHTML = `<div class="status-badge">⚪ ${t.statut_out}</div>`;
  }
}
 
function selectAction(action) {
  selectedAction = action;
  document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  hideError();
}
 
function hideError() { document.getElementById('error-msg').style.display = 'none'; }
 
function showConfirmModal() {
  if (!selectedAgent || !selectedAction) {
    document.getElementById('error-msg').style.display = 'block';
    return;
  }
  const t = T[currentLang];
  const now = new Date();
  const heure = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
 
  document.getElementById('modal-icon').textContent = selectedAction === 'Arrivée' ? '👋' : '👋';
  document.getElementById('modal-title').textContent = selectedAction === 'Arrivée' ? t.modal_arrivee_title : t.modal_depart_title;
  document.getElementById('modal-text').innerHTML = selectedAction === 'Arrivée'
    ? t.modal_arrivee_text(selectedAgent, SITE, heure)
    : t.modal_depart_text(selectedAgent, SITE, heure);
 
  document.getElementById('confirm-modal').classList.add('visible');
}
 
function closeModal() {
  document.getElementById('confirm-modal').classList.remove('visible');
}
 
async function confirmBadge() {
  closeModal();
  const now = new Date();
  const timestamp = now.toLocaleString('fr-FR');
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = T[currentLang].enregistrement;
 
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({agent: selectedAgent, action: selectedAction, site: SITE, timestamp})
    });
  } catch(e) {}
 
  const t = T[currentLang];
 
  if (selectedAction === "Arrivée") {
    agentStatus[selectedAgent] = "in";
    localStorage.setItem("status_" + selectedAgent, "in");
    localStorage.setItem("checkin_" + selectedAgent,
      now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}));
    localStorage.removeItem("tasks_confirmed_" + selectedAgent);
 
    document.getElementById('main-card').style.display = 'none';
    document.getElementById('success-area').style.display = 'block';
    document.getElementById('success-title').textContent = t.arrivee_ok;
    document.getElementById('success-detail').innerHTML = `<strong>${selectedAgent}</strong> — ${SITE}<br>${timestamp}`;
 
    // Bouton départ verrouillé
    const resetBtn = document.getElementById('reset-btn');
    resetBtn.classList.remove('unlocked');
    document.getElementById('reset-label').textContent = t.depart_locked;
 
    // Affiche checklist
    afficherChecklist();
 
  } else {
    agentStatus[selectedAgent] = "out";
    localStorage.setItem("status_" + selectedAgent, "out");
    localStorage.removeItem("checkin_" + selectedAgent);
    localStorage.removeItem("tasks_confirmed_" + selectedAgent);
 
    document.getElementById('main-card').style.display = 'none';
    document.getElementById('checklist-wrap').style.display = 'none';
    document.getElementById('success-area').style.display = 'block';
    document.getElementById('success-title').textContent = t.depart_ok;
    document.getElementById('success-detail').innerHTML = `<strong>${selectedAgent}</strong> — ${SITE}<br>${timestamp}`;
 
    const resetBtn = document.getElementById('reset-btn');
    resetBtn.classList.add('unlocked');
    document.getElementById('reset-label').textContent = t.nouveau;
  }
}
 
function confirmTasks() {
  if (!selectedAgent) return;
  localStorage.setItem("tasks_confirmed_" + selectedAgent, "yes");
 
  const btn = document.getElementById('confirm-tasks-btn');
  btn.classList.add('done');
  btn.querySelector('#confirm-tasks-label').textContent = T[currentLang].tasks_done;
  btn.disabled = true;
 
  // Déverrouille le bouton départ
  const resetBtn = document.getElementById('reset-btn');
  resetBtn.classList.add('unlocked');
  document.getElementById('reset-label').textContent = T[currentLang].nouveau;
}
 
function tryReset() {
  const tasksDone = selectedAgent && localStorage.getItem("tasks_confirmed_" + selectedAgent) === "yes";
  const status = selectedAgent ? (agentStatus[selectedAgent] || "out") : "out";
 
  // Si en session et tâches non confirmées → bloqué
  if (status === "in" && !tasksDone) return;
 
  reset();
}
 
function reset() {
  selectedAgent = null;
  selectedAction = null;
  document.getElementById('main-card').style.display = 'block';
  document.getElementById('success-area').style.display = 'none';
  document.getElementById('checklist-wrap').style.display = 'none';
  document.querySelectorAll('.agent-btn, .action-btn').forEach(b => b.classList.remove('selected'));
  const btn = document.getElementById('submit-btn');
  btn.disabled = false;
  btn.textContent = T[currentLang].valider;
  document.getElementById('status-area').innerHTML = '';
  updateActionButtons();
}
 
function getFrequencesActives(date) {
  const actives = [];
  const jour = date.getDay();
  const dateNum = date.getDate();
  const mois = date.getMonth();
  if (jour === 1) actives.push("hebdo");
  if (dateNum === 1) actives.push("mensuel");
  if (dateNum === 1 && [0,3,6,9].includes(mois)) actives.push("trimestriel");
  return actives;
}
 
function afficherChecklist() {
  const now = new Date();
  const freqs = getFrequencesActives(now);
  const lang = currentLang;
  const t = T[lang];
  const excData = EXCEPTIONAL_TASKS[lang] || EXCEPTIONAL_TASKS.fr;
  const dailyData = DAILY_TASKS[lang] || DAILY_TASKS.fr;
 
  document.getElementById('checklist-title').textContent = t.checklist_title;
  document.getElementById('checklist-date').textContent = now.toLocaleDateString(
    lang === 'en' ? 'en-GB' : 'fr-FR',
    {weekday:'long', day:'numeric', month:'long', year:'numeric'}
  );
 
  // ---- Tâches exceptionnelles ----
  const excArea = document.getElementById('exceptional-area');
  excArea.innerHTML = '';
 
  const block = document.createElement('div');
 
  if (freqs.length === 0) {
    block.className = 'exceptional-block empty';
    const header = document.createElement('div');
    header.className = 'exceptional-header empty';
    header.textContent = t.exc_empty;
    block.appendChild(header);
  } else {
    block.className = 'exceptional-block';
    const header = document.createElement('div');
    header.className = 'exceptional-header';
    header.textContent = t.exc_title;
    block.appendChild(header);
 
    for (const freq of freqs) {
      const freqData = excData[freq] || [];
      const freqLabel = freq === 'hebdo' ? t.freq_hebdo : freq === 'mensuel' ? t.freq_mensuel : t.freq_trimestriel;
      const freqClass = freq;
 
      for (const zone of freqData) {
        const zoneEl = document.createElement('div');
        zoneEl.className = 'exceptional-zone';
 
        const zTitle = document.createElement('div');
        zTitle.className = 'exceptional-zone-title';
        zTitle.textContent = zone.zone;
        zoneEl.appendChild(zTitle);
 
        for (const task of zone.tasks) {
          const item = document.createElement('div');
          item.className = 'exc-task';
          item.innerHTML = `<span style="flex:1">${task}</span><span class="freq-pill ${freqClass}">${freqLabel}</span>`;
          zoneEl.appendChild(item);
        }
 
        block.appendChild(zoneEl);
      }
    }
  }
 
  excArea.appendChild(block);
 
  // ---- Tâches quotidiennes ----
  const dailyArea = document.getElementById('daily-area');
  dailyArea.innerHTML = '';
 
  const dailyBlock = document.createElement('div');
  dailyBlock.className = 'daily-block';
 
  const dailyHeader = document.createElement('div');
  dailyHeader.className = 'daily-header';
  dailyHeader.textContent = t.daily_title;
  dailyBlock.appendChild(dailyHeader);
 
  for (const zone of dailyData) {
    const zoneEl = document.createElement('div');
    zoneEl.className = 'daily-zone';
 
    const zTitle = document.createElement('div');
    zTitle.className = 'daily-zone-title';
    zTitle.textContent = zone.zone;
    zoneEl.appendChild(zTitle);
 
    for (const task of zone.tasks) {
      const item = document.createElement('div');
      item.className = 'daily-task';
      item.innerHTML = `<div class="task-bullet"></div><span>${task}</span>`;
      zoneEl.appendChild(item);
    }
 
    dailyBlock.appendChild(zoneEl);
  }
 
  dailyArea.appendChild(dailyBlock);
 
  // Bouton confirmation tâches
  const confirmBtn = document.getElementById('confirm-tasks-btn');
  confirmBtn.classList.remove('done');
  confirmBtn.disabled = false;
  document.getElementById('confirm-tasks-label').textContent = t.confirm_tasks;
 
  document.getElementById('checklist-wrap').style.display = 'block';
}
 
applyLang();
</script>
